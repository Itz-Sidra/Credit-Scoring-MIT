services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 8000
      REDIS_URL: redis://redis:6379
      ML_PYTHON_BIN: python3
      ML_INFERENCE_TIMEOUT_MS: ${ML_INFERENCE_TIMEOUT_MS:-10000}
      # UPDATED: point to the correct model artifact
      ML_ARTIFACT_PATH: /app/models/new/stacking_pipeline.pkl
    depends_on:
      - redis
      - mongodb
    ports:
      - "8000:8000"          # <-- ADD THIS to access from host
    # remove the "expose:" line entirely

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  mongodb:
    image: mongo:6
    container_name: barclays-mongo
    ports:
      - "27017:27017"
    restart: always
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: